name: Production CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY_CLIENT: public.ecr.aws/r7m1r0t0/blogverse-client-app
  ECR_REPOSITORY_SERVER: public.ecr.aws/r7m1r0t0/blogverse-server-app

jobs:
  lint-and-scan:
    name: Code Quality & Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            client/package-lock.json
            server/package-lock.json

      - name: Install dependencies (Client)
        run: cd client && npm ci

      - name: Install dependencies (Server)
        run: cd server && npm ci

      - name: Lint (Client)
        run: cd client && npm run lint || echo "Linting client failed but continuing for now"

      - name: Lint (Server)
        run: cd server && npm run lint || echo "Linting server failed but continuing for now"

  build-and-push:
    name: Build & Push Docker Images
    needs: lint-and-scan
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR Public
        id: login-ecr-public
        uses: aws-actions/amazon-ecr-login@v1
        with:
          registry-type: public

      - name: Build, tag, and push Client image to Amazon ECR
        env:
          REGISTRY: ${{ steps.login-ecr-public.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REPOSITORY_CLIENT:$IMAGE_TAG ./client
          docker push $ECR_REPOSITORY_CLIENT:$IMAGE_TAG
          docker tag $ECR_REPOSITORY_CLIENT:$IMAGE_TAG $ECR_REPOSITORY_CLIENT:latest
          docker push $ECR_REPOSITORY_CLIENT:latest

      - name: Build, tag, and push Server image to Amazon ECR
        env:
          REGISTRY: ${{ steps.login-ecr-public.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REPOSITORY_SERVER:$IMAGE_TAG ./server
          docker push $ECR_REPOSITORY_SERVER:$IMAGE_TAG
          docker tag $ECR_REPOSITORY_SERVER:$IMAGE_TAG $ECR_REPOSITORY_SERVER:latest
          docker push $ECR_REPOSITORY_SERVER:latest
