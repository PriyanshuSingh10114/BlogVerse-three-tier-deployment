apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: blogverse-prod-cluster
  region: ap-south-1
  version: "1.30"

# Highly Available VPC configuration across 3 Availability Zones
vpc:
  clusterEndpoints:
    publicAccess: true
    privateAccess: true
  nat:
    gateway: HighlyAvailable # 1 NAT per AZ for fault tolerance

managedNodeGroups:
  - name: standard-node-group
    instanceType: t3.medium
    minSize: 2
    maxSize: 5
    desiredCapacity: 2
    volumeSize: 50
    ssh:
      allow: true
    iam:
      withAddonPolicies:
        autoScaler: true
        cloudWatch: true
        albIngress: true
        ebs: true

cloudWatch:
  clusterLogging:
    enableTypes: ["api", "audit", "authenticator", "controllerManager", "scheduler"]
